<svg width="1600" height="720" viewBox="0 0 1600 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Crowd Signal Hero</title>
  <desc id="desc">Crowd Signal visual banner for repository README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="45%" stop-color="#14213d"/>
      <stop offset="100%" stop-color="#1d3557"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7ae582"/>
      <stop offset="100%" stop-color="#4cc9f0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1600" height="720" fill="url(#bg)"/>
  <circle cx="1320" cy="120" r="140" fill="#4cc9f0" opacity="0.22" filter="url(#soft)"/>
  <circle cx="220" cy="600" r="170" fill="#7ae582" opacity="0.18" filter="url(#soft)"/>

  <rect x="120" y="120" width="1360" height="480" rx="24" fill="#0f172a" opacity="0.82"/>
  <rect x="120" y="120" width="1360" height="6" fill="url(#accent)"/>

  <text x="180" y="245" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="74" font-weight="700">
    Crowd Signal
  </text>
  <text x="180" y="305" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="500">
    Intraday crowd simulation for market catalysts
  </text>

  <text x="180" y="385" fill="#e2e8f0" font-family="Consolas, Monaco, monospace" font-size="27">
    Simulate how retail bulls, bears, whales, and algos react tick-by-tick.
  </text>
  <text x="180" y="430" fill="#e2e8f0" font-family="Consolas, Monaco, monospace" font-size="27">
    Stream conversations live, score outcomes, and publish daily catalyst reports.
  </text>

  <g font-family="Consolas, Monaco, monospace" font-size="23" fill="#dbeafe">
    <rect x="180" y="495" width="240" height="50" rx="10" fill="#1e293b"/>
    <text x="205" y="528">FastAPI</text>

    <rect x="440" y="495" width="240" height="50" rx="10" fill="#1e293b"/>
    <text x="466" y="528">Next.js</text>

    <rect x="700" y="495" width="240" height="50" rx="10" fill="#1e293b"/>
    <text x="726" y="528">WebSocket</text>

    <rect x="960" y="495" width="280" height="50" rx="10" fill="#1e293b"/>
    <text x="986" y="528">Persona Engine</text>
  </g>
</svg>
